<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>قصر الشوق - الموقع والمواعيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #c5a059;
            --led-blue: #00f3ff;
            --led-gold: #ffcc00;
            --dark-card: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px 0;
        }

        /* --- أضواء ليد محيطة --- */
        body::before, body::after {
            content: '';
            position: fixed;
            left: 0; width: 100%; height: 4px;
            z-index: 100;
            animation: ledPulse 3s infinite alternate;
        }
        body::before { top: 0; background: var(--led-gold); box-shadow: 0 0 15px var(--led-gold); }
        body::after { bottom: 0; background: var(--led-blue); box-shadow: 0 0 15px var(--led-blue); }

        @keyframes ledPulse {
            0% { opacity: 0.5; filter: brightness(0.8); }
            100% { opacity: 1; filter: brightness(1.2); }
        }

        /* --- الخلفية المتحركة البانورامية --- */
        .animated-bg {
            position: fixed;
            top: 0; left: -10%;
            width: 120%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('./photo/Gemini_Generated_Image_mffzo8mffzo8mffz.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: panoramicMove 20s infinite alternate ease-in-out;
        }

        @keyframes panoramicMove {
            0% { transform: translateX(-5%); }
            100% { transform: translateX(5%); }
        }

        .container {
            width: 90%;
            max-width: 1100px;
            z-index: 1;
            background: var(--dark-card);
            border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 204, 0, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            padding: 40px;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--gold);
            text-shadow: 0 0 15px var(--led-gold);
        }

        /* --- تقسيم المحتوى --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border-right: 4px solid var(--led-gold);
            transition: 0.3s;
        }

        .detail-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .detail-card i {
            color: var(--led-gold);
            font-size: 1.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .detail-card strong {
            display: block;
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .detail-card p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ddd;
        }

        /* --- الخريطة --- */
        .map-wrapper {
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid var(--led-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            height: 100%;
            min-height: 350px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: grayscale(0.2) contrast(1.1);
        }

        /* --- زر العودة --- */
        .footer-nav {
            text-align: center;
            margin-top: 20px;
        }

        .btn-back {
            display: inline-block;
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border: 2px solid var(--led-blue);
            background: rgba(0, 243, 255, 0.1);
            transition: 0.4s;
            box-shadow: 0 0 15px var(--led-blue);
        }

        .btn-back:hover {
            background: var(--led-blue);
            color: #000;
            box-shadow: 0 0 30px var(--led-blue);
            transform: translateY(-3px);
        }

        /* --- التجاوب مع الموبايل --- */
        @media (max-width: 850px) {
            .content-grid { grid-template-columns: 1fr; }
            .container { width: 95%; padding: 20px; }
            .map-wrapper { min-height: 300px; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="container">
        <header>
            <h1>📍 موقعنا ومواعيدنا</h1>
        </header>

        <div class="content-grid">
            <div class="info-section">
                <div class="detail-card">
                    <i class="fas fa-map-marked-alt"></i>
                    <strong>العنوان</strong>
                    <p>حي شبرا مصر - بجوار محطة مترو سانت تريزا <br> (خلف مول سنتريز مباشرة)</p>
                </div>

                <div class="detail-card">
                    <i class="fas fa-clock"></i>
                    <strong>ساعات العمل</strong>
                    <p>يومياً من الساعة 10:00 صباحاً <br> حتى الساعة 02:00 بعد منتصف الليل</p>
                </div>

                <div class="detail-card">
                    <i class="fas fa-star"></i>
                    <strong>خدماتنا</strong>
                    <p>تكييف مركزي - ركن عائلات - Wi-Fi - شاشات عرض</p>
                </div>
            </div>

            <div class="map-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3451.23456789!2d31.245!3d30.085!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDA1JzA2LjAiTiAzMcKwMTQnNDIuMCJF!5e0!3m2!1sar!2seg!4v123456789" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

        <div class="footer-nav">
            <a href="index.html" class="btn-back">🔙 العودة للساحة الرئيسية</a>
        </div>
    </div>

</body>
</html>
