<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصر الشوق - منيو الساقع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --led-blue: #00f3ff;
            --led-gold: #ffcc00;
            --led-red: #ff3131;
            --shadow: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* --- أضواء ليد محيطة --- */
        body::before, body::after {
            content: '';
            position: fixed;
            left: 0; width: 100%; height: 4px;
            z-index: 100;
            box-shadow: 0 0 15px var(--led-blue);
            animation: ledPulse 3s infinite alternate;
        }
        body::before { top: 0; background: var(--led-gold); box-shadow: 0 0 15px var(--led-gold); }
        body::after { bottom: 0; background: var(--led-blue); }

        @keyframes ledPulse {
            0% { opacity: 0.5; filter: brightness(0.8); }
            100% { opacity: 1; filter: brightness(1.2); }
        }

        /* --- الخلفية البانورامية --- */
        .animated-bg {
            position: fixed;
            top: 0; left: -10%;
            width: 120%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('./photo/Gemini_Generated_Image_mffzo8mffzo8mffz.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: panoramicMove 20s infinite alternate ease-in-out;
        }

        @keyframes panoramicMove {
            0% { transform: translateX(-5%); }
            100% { transform: translateX(5%); }
        }

        /* --- الحاوية الرئيسية --- */
        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            z-index: 1;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 204, 0, 0.2);
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.1);
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--gold);
            text-shadow: 0 0 15px var(--led-gold);
        }

        .category-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .category-title p {
            display: inline-block;
            padding: 5px 25px;
            border-radius: 50px;
            border: 1px solid var(--led-blue);
            box-shadow: 0 0 10px var(--led-blue);
            background: rgba(0,0,0,0.5);
            color: #fff;
        }

        /* --- بطاقة المنيو --- */
        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .menu-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .menu-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
        }

        .price-list {
            padding: 20px;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            transition: 0.3s;
        }

        .price-item:hover {
            background: rgba(0, 243, 255, 0.05);
            transform: scale(1.02);
            border-radius: 10px;
        }

        .item-name {
            font-size: 1.2rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-price {
            color: var(--led-gold);
            font-weight: 900;
            background: rgba(197, 160, 89, 0.15);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--gold);
        }

        /* --- الأزرار --- */
        .actions {
            text-align: center;
            margin-top: 30px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--led-gold);
            font-weight: bold;
            padding: 12px 30px;
            border: 2px solid var(--led-gold);
            border-radius: 50px;
            transition: 0.4s;
            display: inline-block;
        }

        .btn-back:hover {
            background: var(--led-gold);
            color: #000;
            box-shadow: 0 0 20px var(--led-gold);
        }

        /* --- اللودر --- */
        .loader {
            text-align: center;
            padding: 50px;
            color: var(--led-blue);
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--led-blue);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--gold);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .container { width: 95%; padding: 15px; }
            .item-name { font-size: 1rem; }
        }
    </style>
</head>

<body>

    <div class="animated-bg"></div>

    <div class="container">
        <header>
            <h1>قصر الشوق</h1>
            <div class="category-title">
                <p>❄️ ركن الساقع - المشروبات الباردة</p>
            </div>
        </header>

        <div id="main-loader" class="loader">
            ⏳ جاري فتح أبواب القصر وتحضير المشروبات...
        </div>

        <div id="section-drinks" class="menu-card" style="display: none;">
            <div class="menu-image">
                <img src="./photo/poznan-poland-apr-bottles-global-soft-drink-brands-including-products-coca-cola-company-pepsico-bottles-global-soft-114614636.webp" alt="مشروبات باردة">
            </div>
            <div id="list-drinks" class="price-list">
                </div>
        </div>

        <div class="actions">
            <a href="index.html" class="btn-back">🔙 العودة للرئيسية</a>
        </div>
    </div>

    <footer>
        &copy; 2026 قصر الشوق - الفخامة المصرية - Techno Science
    </footer>

    <script>
        const drinksSheetURL = 'https://docs.google.com/spreadsheets/d/1OeeRr0L5e_ndyvTEbUyXxnvupHE2wcRgF17niiuXujk/export?format=csv';

        async function loadDrinks() {
            const loaderDiv = document.getElementById('main-loader');
            const sectionContainer = document.getElementById('section-drinks');
            const listContainer = document.getElementById('list-drinks');
            
            try {
                const response = await fetch(drinksSheetURL);
                if (!response.ok) throw new Error('فشل تحميل البيانات');
                
                const data = await response.text();
                const rows = data.split('\n').filter(row => row.trim().length > 0);
                
                let startIndex = 1; // تخطي العنوان
                let html = '';
                
                for (let i = startIndex; i < rows.length; i++) {
                    let columns = rows[i].split(',').map(col => col.replace(/^"|"$/g, '').trim());
                    
                    if (columns.length >= 2) {
                        const drinkName = columns[0];
                        const price = columns[1];
                        if (drinkName && price) {
                            html += `
                                <div class="price-item">
                                    <span class="item-name">🥤 ${drinkName}</span>
                                    <span class="item-price">${price} ج.م</span>
                                </div>`;
                        }
                    }
                }
                
                listContainer.innerHTML = html;
                sectionContainer.style.display = 'block';
                loaderDiv.style.display = 'none';
                
            } catch (error) {
                loaderDiv.innerHTML = `<p style="color:var(--led-red)">⚠️ حدث خطأ في تحميل المنيو.. حاول مرة أخرى</p>`;
            }
        }
        
        loadDrinks();
    </script>

</body>
</html>
