<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نادي الإخلاص  </title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --wood-brown: #3d2616;
            --led-gold: #ffcc00;
            --led-pink: #ff0055;
            --led-shadow: 0 0 15px rgba(255, 204, 0, 0.8), 0 0 30px rgba(255, 204, 0, 0.4);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0d0800;
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

/* الأنماط المتحركة للـ Header والـ Footer */
header, footer {
    /* لون الخلفية الأساسي */
    background-color: var(--wood-brown);
    /* إضافة نمط خطوط مائلة أغمق قليلاً */
    background-image: linear-gradient(
        45deg, 
        rgba(0, 0, 0, 0.2) 25%, 
        transparent 25%, 
        transparent 50%, 
        rgba(0, 0, 0, 0.2) 50%, 
        rgba(0, 0, 0, 0.2) 75%, 
        transparent 75%, 
        transparent
    );
    background-size: 80px 80px; /* حجم النمط */
    animation: movePattern 30s linear infinite; /* تشغيل الحركة */
}

header {
    padding: 12px 5%;
    backdrop-filter: blur(4px);
    border-bottom: 2px solid var(--led-gold);
    display: flex;
    justify-content: flex-end;
    align-items: center;
}

footer {
    padding: 15px 12px;
    font-size: 0.85rem;
    text-align: center;
    color: var(--led-gold);
    width: 100%;
    margin-top: auto;
    font-weight: 600;
    border-top: 2px solid var(--led-gold);
}

/* حركة النمط */
@keyframes movePattern {
    0% {
        background-position: 0 0;
    }
    100% {
        background-position: 800px 40px;
    }
}


        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .nav-link {
            color: var(--led-gold);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 8px 18px;
            border: 1px solid var(--led-gold);
            border-radius: 40px;
            transition: 0.3s;
            background: rgba(0,0,0,0.6);
        }

        .nav-link:hover {
            background: var(--led-gold);
            color: #1a1a00;
            box-shadow: 0 0 12px var(--led-gold);
        }

        .gallery-section {
            flex: 1;
            padding: 40px 5%;
        }

        .page-title {
            background: rgba(0, 0, 0, 0.65);
            border: 3px solid var(--led-gold);
            border-radius: 28px;
            padding: 30px 20px;
            margin-bottom: 45px;
            text-align: center;
            box-shadow: var(--led-shadow), inset var(--led-shadow);
            backdrop-filter: blur(3px);
        }

        .page-title h1 {
            font-size: clamp(1.8rem, 8vw, 3rem);
            font-weight: 900;
            color: var(--led-gold);
            text-shadow: 0 0 8px #ffcc00;
            margin-bottom: 10px;
        }

        .page-title p {
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #f0e6c5;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            grid-auto-rows: 180px;
            grid-auto-flow: dense;
            gap: 18px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 2px solid transparent;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.4s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: var(--led-gold);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        .gallery-item:hover img {
            filter: brightness(0.85);
        }

        .wide {
            grid-column: span 2;
        }

        .tall {
            grid-row: span 2;
        }

        .big {
            grid-column: span 2;
            grid-row: span 2;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--wood-brown);
            color: var(--led-gold);
            padding: 10px 25px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #e4a022;
            margin-top: 40px;
            transition: 0.2s;
        }

        .back-home:hover {
            background: #5a3a20;
            box-shadow: 0 0 10px var(--led-gold);
        }



        .footer-content {
            color: var(--led-gold);
            font-size: 0.85rem;
            font-weight: 600;
        }

        @media (max-width: 650px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: 140px;
                gap: 12px;
            }
            .big, .wide {
                grid-column: span 2;
            }
            nav {
                gap: 12px;
                flex-wrap: wrap;
            }
            .nav-link {
                font-size: 0.9rem;
                padding: 6px 12px;
            }
            .gallery-section {
                padding: 25px 4%;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-auto-rows: 120px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<header>

            <img src="./photo/imges/poznan-poland-apr-bottles-global-soft-drink-brands-including-products-coca-cola-company-pepsico-bottles-global-soft-114614636.webp " alt="جلسة خارجية - قعدة أصدقاء">

    <footer>

<script type="module">
    import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
    const lightbox = new PhotoSwipeLightbox({
